name: Vendor logback-android + mail

on:
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone logback-android v_3.0.0
        run: |
          wget https://github.com/tony19/logback-android/archive/refs/tags/v_3.0.0.zip
          unzip v_3.0.0.zip
          mkdir -p wallet/src/wallet/java/
          cp -r logback-android-v_3.0.0/logback-android/src/main/java/ch wallet/src/wallet/java/
          rm -rf v_3.0.0.zip logback-android-v_3.0.0

      - name: Clone android-mail 1.6.7 SMTP only
        run: |
          wget https://repo1.maven.org/maven2/com/sun/mail/android-mail/1.6.7/android-mail-1.6.7-sources.jar
          mkdir -p temp_mail
          cd temp_mail && unzip ../android-mail-1.6.7-sources.jar
          mkdir -p ../wallet/src/wallet/java/com/sun/mail/
          # Chỉ lấy 4 thư mục này thôi
          cp -r com/sun/mail/smtp ../wallet/src/wallet/java/com/sun/mail/
          cp -r com/sun/mail/util ../wallet/src/wallet/java/com/sun/mail/
          cp -r com/sun/mail/auth ../wallet/src/wallet/java/com/sun/mail/
          cp -r com/sun/mail/iap ../wallet/src/wallet/java/com/sun/mail/
          cd .. && rm -rf android-mail-1.6.7-sources.jar temp_mail

      - name: Strip javax + DB + SQLiteAppender
        run: |
          # Xoá sạch javax vì SMTPAppender không cần
          rm -rf wallet/src/wallet/java/javax
          
          # Xoá SQLiteAppender + DB package
          rm -f wallet/src/wallet/java/ch/qos/logback/classic/android/SQLiteAppender.java
          rm -rf wallet/src/wallet/java/ch/qos/logback/classic/db/

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Vendor logback-android 3.0.0 + android-mail SMTP only"
          file_pattern: wallet/src/wallet/java/**