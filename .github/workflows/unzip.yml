name: Unzip bitcoinj source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Gradle Wrapper 7.6.1
        run: |
          if [! -f./gradlew ]; then
            echo "Wrapper missing, creating..."
            wget -q https://services.gradle.org/distributions/gradle-7.6.1-bin.zip
            unzip -q gradle-7.6.1-bin.zip
           ./gradle-7.6.1/bin/gradle wrapper --gradle-version 7.6.1 --distribution-type bin
          else
            echo "Wrapper exists"
          fi
          chmod +x gradlew
         ./gradlew --version

      - name: Unzip and move bitcoinj
        run: |
          cd wallet/src/wallet/java
          unzip bitcoinj-master.zip
          mkdir -p org/bitcoinj/base/exceptions
          mkdir -p org/bitcoinj/base/internal
          mkdir -p org/bitcoinj/base/utils
          mkdir -p org/bitcoinj/core
          mkdir -p org/bitcoinj/crypto
          mkdir -p org/bitcoinj/kits
          mkdir -p org/bitcoinj/net
          mkdir -p org/bitcoinj/params
          mkdir -p org/bitcoinj/script
          mkdir -p org/bitcoinj/signers
          mkdir -p org/bitcoinj/store
          mkdir -p org/bitcoinj/testing
          mkdir -p org/bitcoinj/uri
          mkdir -p org/bitcoinj/utils
          mkdir -p org/bitcoinj/wallet

          cp bitcoinj-master/base/src/main/java/org/bitcoinj/base/*.java org/bitcoinj/base/
          cp -r bitcoinj-master/base/src/main/java/org/bitcoinj/base/exceptions/* org/bitcoinj/base/exceptions/
          cp -r bitcoinj-master/base/src/main/java/org/bitcoinj/base/internal/* org/bitcoinj/base/internal/
          cp -r bitcoinj-master/base/src/main/java/org/bitcoinj/base/utils/* org/bitcoinj/base/utils/

          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/core/* org/bitcoinj/core/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/crypto/* org/bitcoinj/crypto/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/kits/* org/bitcoinj/kits/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/net/* org/bitcoinj/net/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/params/* org/bitcoinj/params/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/script/* org/bitcoinj/script/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/signers/* org/bitcoinj/signers/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/store/* org/bitcoinj/store/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/testing/* org/bitcoinj/testing/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/uri/* org/bitcoinj/uri/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/utils/* org/bitcoinj/utils/
          cp -r bitcoinj-master/core/src/main/java/org/bitcoinj/wallet/* org/bitcoinj/wallet/

          rm -rf bitcoinj-master.zip bitcoinj-master

      - name: Commit files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add full bitcoinj source + gradle 7.6.1
          file_pattern:.
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: buli-net <285223619+buli-net@users.noreply.github.com>