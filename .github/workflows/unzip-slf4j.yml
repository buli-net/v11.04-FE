name: Unzip SLF4J

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip org.zip
        run: |
          cd wallet/src/wallet/java
          unzip -o org.zip
          rm org.zip
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wallet/src/wallet/java/org/
          git commit -m "Vendor slf4j-api 2.0.17" || echo "No changes to commit"
          git push