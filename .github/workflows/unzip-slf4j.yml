name: Unzip org-slf4j

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip slf4j.zip
        run: |
          cd wallet/src/wallet/java/org
          unzip -o slf4j.zip -d slf4j
          rm org.zip

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzip slf4j.zip" || echo "No changes"
          git push
