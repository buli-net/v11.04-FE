name: Unzip org-bouncycastle

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip org.zip
        run: |
          cd wallet/src/wallet/java/
          unzip -o org.zip -d org
          rm org.zip

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzip org.zip" || echo "No changes"
          git push